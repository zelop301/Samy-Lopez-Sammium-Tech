name: Bug report
description: Report a reproducible Sentinel Sense problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, tokens, or private environment values.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. Start the app...\n2. Open...\n3. Click..."
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Windows 11, Node 22, Edge 150"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
